<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CNG-Go Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 font-sans h-screen flex flex-col">

    <nav class="bg-blue-700 text-white p-5 shadow-xl text-center">
        <h1 class="text-2xl font-black italic">CNG-GO 🚕</h1>
        <p class="text-xs opacity-80">Live Station Status / लाइव स्टेशन स्थिति</p>
    </nav>

    <div id="app" class="p-4 space-y-4">
        <div class="bg-white p-5 rounded-3xl shadow-sm border-2 border-slate-200">
            <h2 class="text-xl font-bold mb-3 text-slate-800 text-center">IGL Okhla Phase 3</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="sendUpdate('Okhla P3', '🟢 FAST')" class="bg-green-500 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">🟢 चालू</button>
                <button onclick="sendUpdate('Okhla P3', '🟡 BUSY')" class="bg-yellow-500 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">🟡 भीड़</button>
            </div>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border-2 border-slate-200">
            <h2 class="text-xl font-bold mb-3 text-slate-800 text-center">HP Jasola</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="sendUpdate('Jasola', '🟢 FAST')" class="bg-green-500 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">🟢 चालू</button>
                <button onclick="sendUpdate('Jasola', '🟡 BUSY')" class="bg-yellow-500 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">🟡 भीड़</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mzvluvaopokcltibmewd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16dmx1dmFvcG9rY2x0aWJtZXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Nzc3MTksImV4cCI6MjA5MTE1MzcxOX0.w0JPlKdQbfe2rdEKZDwAzptNhW-HGlbTxO6UdPWtU0Y';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function sendUpdate(name, status) {
            console.log("Sending...");
            const { error } = await supabase
                .from('station_updates')
                .insert([{ station_name: name, status: status }]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Updated! / जानकारी भेज दी गई है! ✅");
            }
        }
    </script>
</body>
</html>
